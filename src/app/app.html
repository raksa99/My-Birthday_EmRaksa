<!-- Floating Background Celebrations -->
<div class="fixed inset-0 pointer-events-none select-none z-0 overflow-hidden">
  @for (item of floatingItems(); track $index) {
    <span 
      class="floating-item"
      [style.left]="item.left"
      [style.animation-delay]="item.delay"
      [style.animation-duration]="item.duration"
      [style.font-size]="item.size">
      {{ item.symbol }}
    </span>
  }
</div>

<!-- Header / Navigation -->
<header class="fixed top-0 inset-x-0 z-40 bg-[#0b0914]/80 backdrop-blur-md border-b border-white/5 px-4 md:px-8 py-4 transition-all duration-300">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    
    <!-- Logo -->
    <a href="#hero" class="font-display font-black text-lg tracking-widest text-white flex items-center gap-2 group">
      <span class="text-gradient-pink">EM RAKSA</span>
      <span class="text-xs px-2 py-0.5 rounded-full bg-pink-500/10 text-pink-400 border border-pink-500/20 group-hover:scale-105 transition-transform">21 JULY</span>
    </a>

    <!-- Nav Links -->
    <nav class="hidden md:flex items-center gap-8 text-sm font-semibold tracking-wider uppercase">
      <a href="#hero" class="text-gray-400 hover:text-white transition-colors">Home</a>
      <a href="#gallery" class="text-gray-400 hover:text-white transition-colors">Memories</a>
      <a href="#wishes" class="text-gray-400 hover:text-white transition-colors">Wishes Board</a>
    </nav>

    <!-- Right Controls: Audio Player & CTA -->
    <div class="flex items-center gap-4">
      <!-- Ambient Music Wave / Button -->
      <button 
        (click)="toggleMusic()"
        class="flex items-center gap-2 px-4 py-2 rounded-full glass-panel border-white/10 hover:border-cyan-500/30 hover:bg-white/5 transition-all duration-300 cursor-pointer"
        [title]="isMusicPlaying() ? 'Pause Ambient Music' : 'Play Ambient Music'">
        
        <!-- Audio Waves (playing state) -->
        <span class="flex items-end h-4 w-6 mr-1" *ngIf="isMusicPlaying()">
          <span class="audio-bar"></span>
          <span class="audio-bar"></span>
          <span class="audio-bar"></span>
          <span class="audio-bar"></span>
          <span class="audio-bar"></span>
        </span>

        <!-- Audio Mute Icon (paused state) -->
        <svg *ngIf="!isMusicPlaying()" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
        </svg>

        <span class="text-xs font-bold tracking-widest uppercase text-white">
          {{ isMusicPlaying() ? 'MUSIC ON' : 'MUSIC OFF' }}
        </span>
      </button>
      
      <!-- Quick link to Wishes -->
      <a 
        href="#wishes" 
        class="hidden sm:inline-block px-5 py-2 rounded-full bg-pink-500 hover:bg-pink-600 font-bold text-xs text-white uppercase tracking-wider transition-all duration-300 shadow-lg hover:shadow-pink-500/20 hover:scale-105">
        Wish Him
      </a>
    </div>

  </div>
</header>

<!-- Main Page Sections -->
<main class="relative z-10">
  <app-hero></app-hero>
  <app-gallery></app-gallery>
  <app-wish-form></app-wish-form>
  <app-footer></app-footer>
</main>
